<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>

  <!-- Laptop Lid Bezel -->
  <rect x="100" y="30" width="800" height="520" rx="24" fill="url(#lidGrad)" stroke="#0f172a" stroke-width="6" />
  
  <!-- Inner Bezel (slightly darker/plastic edge) -->
  <rect x="106" y="36" width="788" height="508" rx="18" fill="#111827" />
  
  <!-- Screen Area (Black) -->
  <rect x="114" y="44" width="772" height="476" rx="4" fill="#000000" />
  
  <!-- Webcam and sensor -->
  <circle cx="500" cy="40" r="4" fill="#030712" />
  <circle cx="512" cy="40" r="2" fill="#030712" />
  
  <!-- Laptop Base/Deck -->
  <path d="M 60 550 C 60 535 80 535 100 535 L 900 535 C 920 535 940 535 940 550 L 980 585 C 980 595 950 600 900 600 L 100 600 C 50 600 20 595 20 585 Z" fill="url(#baseGrad)" stroke="#111827" stroke-width="2" />
  
  <!-- Hinge -->
  <rect x="250" y="533" width="500" height="8" rx="4" fill="#0f172a" />
  
  <!-- Touchpad indentation / Front Lip -->
  <rect x="420" y="585" width="160" height="8" rx="4" fill="#1f2937" />
</svg>
